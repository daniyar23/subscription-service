services:
  postgres:
    image: postgres:17-alpine
    container_name: subscribe_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER} -h ${DB_HOST} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "${DB_URL}", "up"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subscription_app
    command: ["go", "run", "./cmd/app/main.go"]
    environment:
      - DB_URL=${DB_URL}
      - PORT=${PORT}
    ports:
      - "${PORT}:8080"
    depends_on:
      - postgres
      - migrate

volumes:
  postgres_data:
